name: 'Setup Ubuntu'
description: 'Set up Ubuntu for installing TSWoW'

runs:
  using: "composite"
  steps:
    - name: Select node version
      uses: https://data.forgejo.org/actions/setup-node@v3
      with:
        node-version: 18.12.1

    - name: Install deps
      shell: bash
      run: |
        export DEBIAN_FRONTEND=noninteractive
        sudo apt-get update
        sudo apt-get install -y git clang cmake make gcc g++ libmysqlclient-dev libssl-dev libbz2-dev libreadline-dev libncurses-dev libboost-all-dev mysql-server p7zip
        sudo update-alternatives --install /usr/bin/cc cc /usr/bin/clang 100
        sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/clang 100